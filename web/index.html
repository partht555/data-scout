<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Scout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <a class="brand" href="#"><span class="brand-mark">✦</span> Data Scout</a>
        <button class="new-chat" type="button" id="new-chat">+ New search</button>
        <div class="sidebar-footer">Live dataset discovery<br /><span>Powered by AWS</span></div>
      </aside>

      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">DATASET DISCOVERY ASSISTANT</p>
            <h1>What are you looking to build?</h1>
          </div>
          <span class="status"><i></i> Ready</span>
        </header>

        <section class="conversation" id="conversation" aria-live="polite">
          <article class="message assistant-message intro-message">
            <div class="avatar">✦</div>
            <div class="bubble">
              <p>I can help you find datasets for a project. Tell me what you need in plain language; I'll turn it into a search request.</p>
              <div class="prompt-grid">
                <button type="button" class="prompt" data-prompt="Find 3 CSV datasets for retail sales forecasting">Retail forecasting <span>Find 3 CSV datasets for retail sales forecasting</span></button>
                <button type="button" class="prompt" data-prompt="I need food datasets for nutrition analysis">Nutrition analysis <span>I need food datasets for nutrition analysis</span></button>
                <button type="button" class="prompt" data-prompt="Show me Formula 1 race results data">Sports statistics <span>Show me Formula 1 race results data</span></button>
              </div>
            </div>
          </article>
        </section>

        <form class="composer" id="search-form">
          <label class="sr-only" for="prompt-input">Describe the dataset you need</label>
          <textarea id="prompt-input" rows="1" placeholder="Ask for datasets in plain language..." required></textarea>
          <button class="send" type="submit" aria-label="Send search">↑</button>
          <div class="composer-hint"><span>Enter</span> to search <b>·</b> <span>Shift + Enter</span> for a new line</div>
        </form>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
